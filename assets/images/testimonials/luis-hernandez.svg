<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgLuis" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fefce8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fef3c7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinLuis" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4956a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c19a6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="300" fill="url(#bgLuis)"/>
  
  <!-- Head -->
  <circle cx="150" cy="120" r="45" fill="url(#skinLuis)"/>
  
  <!-- Hair (short, slicked back) -->
  <path d="M 105 85 Q 105 75 150 75 Q 195 75 195 85 L 195 105 Q 195 100 150 103 Q 105 100 105 105 Z" fill="#3d3d3d" stroke="none"/>
  <!-- Hair shine -->
  <ellipse cx="130" cy="82" rx="12" ry="4" fill="white" opacity="0.2"/>
  
  <!-- Ears -->
  <ellipse cx="105" cy="115" rx="8" ry="12" fill="url(#skinLuis)"/>
  <ellipse cx="195" cy="115" rx="8" ry="12" fill="url(#skinLuis)"/>
  
  <!-- Eyes -->
  <circle cx="135" cy="115" r="5" fill="#333"/>
  <circle cx="165" cy="115" r="5" fill="#333"/>
  <circle cx="136" cy="113" r="2" fill="white"/>
  <circle cx="166" cy="113" r="2" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M 125 105 Q 135 102 145 105" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 155 105 Q 165 102 175 105" stroke="#2a2a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <line x1="150" y1="115" x2="150" y2="130" stroke="#b8956a" stroke-width="2"/>
  
  <!-- Confident smile -->
  <path d="M 135 140 Q 150 148 165 140" stroke="#8b6f47" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="135" y="165" width="30" height="15" fill="url(#skinLuis)"/>
  
  <!-- Suit/polo -->
  <path d="M 110 180 L 105 240 L 195 240 L 190 180 Q 150 170 110 180" fill="#374151" stroke="none"/>
  
  <!-- Tie -->
  <path d="M 145 180 L 140 210 L 145 215 L 150 212 L 155 215 L 160 210 L 155 180 Z" fill="#ca8a04"/>
</svg>