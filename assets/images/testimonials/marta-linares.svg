<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgMarta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcfce7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinMarta" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ead1dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dcc7d6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="300" height="300" fill="url(#bgMarta)"/>
  
  <!-- Head -->
  <circle cx="150" cy="120" r="45" fill="url(#skinMarta)"/>
  
  <!-- Hair (short, curly) -->
  <path d="M 105 100 Q 105 75 150 75 Q 195 75 195 100" fill="#6b4423" stroke="none"/>
  <circle cx="115" cy="85" r="7" fill="#6b4423"/>
  <circle cx="185" cy="85" r="7" fill="#6b4423"/>
  <circle cx="125" cy="75" r="6" fill="#6b4423"/>
  <circle cx="175" cy="75" r="6" fill="#6b4423"/>
  
  <!-- Ears -->
  <ellipse cx="105" cy="115" rx="8" ry="12" fill="url(#skinMarta)"/>
  <ellipse cx="195" cy="115" rx="8" ry="12" fill="url(#skinMarta)"/>
  
  <!-- Eyes -->
  <circle cx="135" cy="115" r="5" fill="#333"/>
  <circle cx="165" cy="115" r="5" fill="#333"/>
  <circle cx="136" cy="113" r="2" fill="white"/>
  <circle cx="166" cy="113" r="2" fill="white"/>
  
  <!-- Eyebrows -->
  <path d="M 125 105 Q 135 102 145 105" stroke="#5a3a27" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 155 105 Q 165 102 175 105" stroke="#5a3a27" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <line x1="150" y1="115" x2="150" y2="130" stroke="#d4a5a5" stroke-width="2"/>
  
  <!-- Kind smile -->
  <path d="M 135 140 Q 150 150 165 140" stroke="#c08080" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Neck -->
  <rect x="135" y="165" width="30" height="15" fill="url(#skinMarta)"/>
  
  <!-- Blouse -->
  <path d="M 110 180 L 105 240 L 195 240 L 190 180 Q 150 170 110 180" fill="#ec4899" stroke="none"/>
</svg>