<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f74ea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="18" cy="18" r="16" fill="url(#logoGradient)" opacity="0.9"/>
  
  <!-- Medical cross icon -->
  <g fill="white" stroke="none">
    <!-- Vertical bar -->
    <rect x="15" y="8" width="6" height="20" rx="1" fill="white"/>
    <!-- Horizontal bar -->
    <rect x="8" y="15" width="20" height="6" rx="1" fill="white"/>
  </g>
  
  <!-- Accent circle border -->
  <circle cx="18" cy="18" r="16" fill="none" stroke="white" stroke-width="0.5" opacity="0.4"/>
</svg>
