<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="500" fill="#fef2f2"/>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="100" r="70" fill="#fee2e2" opacity="0.6"/>
  <circle cx="520" cy="420" r="80" fill="#ccfbf1" opacity="0.5"/>
  
  <!-- Patient in hospital bed -->
  <g transform="translate(150, 200)">
    <!-- Pillow -->
    <rect x="0" y="0" width="120" height="25" fill="#f5f5f5" rx="3"/>
    <!-- Head on pillow -->
    <circle cx="60" cy="20" r="28" fill="#f5d5b8"/>
    <!-- Hair -->
    <path d="M 32 20 Q 32 -5, 60 -5 Q 88 -5, 88 20 Z" fill="#8b5a3c"/>
    <!-- Body - under covers -->
    <rect x="20" y="48" width="80" height="70" fill="#fecaca" rx="8"/>
    <!-- Arms over covers -->
    <rect x="5" y="65" width="15" height="45" fill="#f5d5b8" rx="7"/>
    <rect x="105" y="68" width="15" height="42" fill="#f5d5b8" rx="7"/>
    <!-- Blanket fold details -->
    <path d="M 25 50 Q 60 55, 95 50" stroke="#fca5a5" stroke-width="2" fill="none" opacity="0.6"/>
  </g>
  
  <!-- IV Stand -->
  <g transform="translate(280, 140)">
    <!-- Main pole -->
    <rect x="8" y="0" width="8" height="140" fill="#64748b" stroke="#475569" stroke-width="1"/>
    <!-- Cross bar at top -->
    <rect x="0" y="0" width="24" height="5" fill="#64748b" rx="2"/>
    <!-- IV bag -->
    <g transform="translate(0, 20)">
      <path d="M 5 0 L 0 30 Q 0 38, 8 38 Q 16 38, 16 30 L 11 0 Z" fill="#e0f7fa" stroke="#0d9488" stroke-width="2" rx="2"/>
      <!-- Liquid inside -->
      <path d="M 4 28 Q 4 36, 8 36 Q 12 36, 12 28 Z" fill="#06b6d4" opacity="0.7"/>
      <!-- Label -->
      <text x="8" y="20" font-size="6" fill="#0d7377" text-anchor="middle" font-weight="bold">IV</text>
    </g>
    <!-- Tube connector -->
    <circle cx="12" cy="58" r="3" fill="#64748b"/>
  </g>
  
  <!-- Nurse attending patient -->
  <g transform="translate(80, 120)">
    <!-- Head -->
    <circle cx="50" cy="40" r="30" fill="#ecc5a8"/>
    <!-- Hair -->
    <path d="M 20 40 Q 20 15, 50 15 Q 80 15, 80 40 Z" fill="#c17a3a"/>
    <!-- Nurse cap -->
    <circle cx="50" cy="20" r="22" fill="white" opacity="0.8"/>
    <circle cx="50" cy="23" r="20" fill="#e0f2fe" stroke="#1f74ea" stroke-width="2"/>
    <!-- Body -->
    <rect x="15" y="70" width="70" height="85" fill="#14b8a6" rx="8"/>
    <!-- Arms (reaching to patient) -->
    <rect x="-5" y="82" width="20" height="70" fill="#ecc5a8" rx="10"/>
    <rect x="85" y="85" width="20" height="67" fill="#ecc5a8" rx="10"/>
    <!-- Hands -->
    <circle cx="-2" cy="154" r="6" fill="#ecc5a8"/>
    <circle cx="105" cy="157" r="6" fill="#ecc5a8"/>
  </g>
  
  <!-- Doctor with stethoscope (right side) -->
  <g transform="translate(380, 150)">
    <!-- Head -->
    <circle cx="45" cy="35" r="30" fill="#f0d0bc"/>
    <!-- Hair -->
    <path d="M 15 35 Q 15 10, 45 10 Q 75 10, 75 35 Z" fill="#1a5dd7"/>
    <!-- Stethoscope -->
    <path d="M 30 45 Q 25 35, 20 25" stroke="#14b8a6" stroke-width="3" fill="none" stroke-linecap="round"/>
    <circle cx="20" cy="25" r="4" fill="#14b8a6"/>
    <!-- Body - Medical coat -->
    <rect x="10" y="65" width="70" height="95" fill="white" stroke="#1f74ea" stroke-width="2" rx="8"/>
    <!-- Pocket -->
    <rect x="20" y="85" width="18" height="20" fill="#e0f2fe" stroke="#1f74ea" stroke-width="1" rx="2"/>
    <!-- Pen in pocket -->
    <line x1="32" y1="90" x2="32" y2="105" stroke="#1f74ea" stroke-width="2"/>
    <!-- Arms -->
    <rect x="-5" y="75" width="15" height="70" fill="#f0d0bc" rx="7"/>
    <rect x="75" y="78" width="15" height="67" fill="#f0d0bc" rx="7"/>
  </g>
  
  <!-- Monitor/Vital signs display -->
  <g transform="translate(320, 290)">
    <!-- Monitor body -->
    <rect x="0" y="0" width="80" height="60" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="3"/>
    <!-- Bezel -->
    <rect x="3" y="3" width="74" height="54" fill="#0f172a"/>
    <!-- Screen -->
    <rect x="5" y="5" width="70" height="50" fill="#1e3a8a"/>
    <!-- Heart rate waveform -->
    <polyline points="10,30 12,28 14,32 16,25 18,35 20,30 22,32 24,28 26,33 28,30 30,32 32,29 34,34 36,30 38,31 40,30 42,33 44,28 46,32 48,30 50,33 52,29 54,34 56,30 58,32 60,28 62,35 64,30 66,32 68,29 70,34" stroke="#22c55e" stroke-width="1.5" fill="none" opacity="0.8"/>
    <!-- Vitals info (text simulation) -->
    <text x="10" y="58" font-size="5" fill="#fbbf24">HR: 72</text>
    <text x="50" y="58" font-size="5" fill="#22c55e">OK</text>
  </g>
  
  <!-- Comfort elements - chair beside bed -->
  <g transform="translate(50, 320)">
    <!-- Armrest left -->
    <rect x="0" y="25" width="8" height="40" fill="#9ca3af" rx="3"/>
    <!-- Seat -->
    <ellipse cx="25" cy="55" rx="28" ry="15" fill="#d1d5db"/>
    <!-- Backrest -->
    <path d="M 10 25 Q 25 15, 40 25" fill="#d1d5db" stroke="#9ca3af" stroke-width="2"/>
    <!-- Armrest right -->
    <rect x="42" y="28" width="8" height="37" fill="#9ca3af" rx="3"/>
    <!-- Legs -->
    <line x1="15" y1="70" x2="15" y2="85" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
    <line x1="35" y1="70" x2="35" y2="85" stroke="#6b7280" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- Heart symbol (care emphasis) -->
  <g transform="translate(470, 80)" opacity="0.8">
    <path d="M 0 -5 C -6 -11, -14 -11, -14 -3 C -14 2, -6 8, 0 13 C 6 8, 14 2, 14 -3 C 14 -11, 6 -11, 0 -5 Z" fill="#ef4444"/>
  </g>
  
  <!-- Plus symbol -->
  <g transform="translate(520, 200)" opacity="0.6">
    <rect x="-3" y="-10" width="6" height="20" fill="#14b8a6"/>
    <rect x="-10" y="-3" width="20" height="6" fill="#14b8a6"/>
  </g>
  
  <!-- Comfort items on nightstand -->
  <g transform="translate(280, 340)">
    <!-- Nightstand surface -->
    <rect x="0" y="0" width="50" height="10" fill="#d4a574" rx="2"/>
    <!-- Water pitcher -->
    <g transform="translate(8, -20)">
      <rect x="0" y="15" width="12" height="16" fill="#e0f7fa" stroke="#06b6d4" stroke-width="1.5" rx="1"/>
      <path d="M 15 18 L 18 15 L 15 16 Z" fill="#06b6d4"/>
    </g>
    <!-- Call button -->
    <circle cx="32" cy="-12" r="6" fill="#ef4444" stroke="#dc2626" stroke-width="1"/>
  </g>
</svg>