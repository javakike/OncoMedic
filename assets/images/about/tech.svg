<svg viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="500" fill="#f5f3ff"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="#e0e7ff" opacity="0.6"/>
  <circle cx="550" cy="450" r="75" fill="#ccfbf1" opacity="0.5"/>
  
  <!-- Technician with tablet -->
  <g transform="translate(280, 120)">
    <!-- Head -->
    <circle cx="50" cy="35" r="32" fill="#f5d5b8"/>
    <!-- Hair -->
    <path d="M 18 35 Q 18 8, 50 8 Q 82 8, 82 35 Z" fill="#8b5a3c"/>
    <!-- Body -->
    <rect x="15" y="67" width="70" height="90" fill="#1f74ea" rx="8"/>
    <!-- Arms (holding tablet) -->
    <rect x="-8" y="80" width="23" height="75" fill="#f5d5b8" rx="11"/>
    <rect x="85" y="83" width="23" height="72" fill="#f5d5b8" rx="11"/>
    <!-- Tablet in hands -->
    <rect x="25" y="100" width="50" height="65" fill="#06b6d4" stroke="#0891b2" stroke-width="2" rx="4"/>
    <rect x="28" y="103" width="44" height="59" fill="#e0f7fa" rx="2"/>
    <!-- Screen content -->
    <circle cx="50" cy="120" r="8" fill="#06b6d4" opacity="0.6"/>
    <line x1="35" y1="135" x2="65" y2="135" stroke="#0891b2" stroke-width="1.5"/>
    <line x1="35" y1="143" x2="65" y2="143" stroke="#0891b2" stroke-width="1.5"/>
    <line x1="35" y1="151" x2="55" y2="151" stroke="#0891b2" stroke-width="1.5"/>
  </g>
  
  <!-- CT Scanner / Medical Imaging Device (left side) -->
  <g transform="translate(60, 280)">
    <!-- Scanner ring/gantry -->
    <circle cx="50" cy="40" r="42" fill="none" stroke="#64748b" stroke-width="3"/>
    <circle cx="50" cy="40" r="38" fill="#e2e8f0" opacity="0.3"/>
    <!-- Opening -->
    <circle cx="50" cy="40" r="30" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <!-- Center X -->
    <line x1="50" y1="20" x2="50" y2="60" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="40" x2="70" y2="40" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
    <!-- Control panel below -->
    <rect x="20" y="90" width="60" height="25" fill="#1e293b" stroke="#64748b" stroke-width="1.5" rx="2"/>
    <circle cx="30" cy="102" r="3" fill="#ef4444"/>
    <circle cx="50" cy="102" r="3" fill="#22c55e"/>
    <circle cx="70" cy="102" r="3" fill="#3b82f6"/>
  </g>
  
  <!-- Monitor/Screen showing medical data (right side) -->
  <g transform="translate(380, 240)">
    <!-- Monitor stand -->
    <rect x="10" y="120" width="30" height="20" fill="#475569" rx="2"/>
    <!-- Monitor base -->
    <ellipse cx="25" cy="140" rx="20" ry="8" fill="#64748b"/>
    <!-- Screen -->
    <rect x="0" y="20" width="50" height="100" fill="#1e293b" stroke="#64748b" stroke-width="2" rx="3"/>
    <!-- Bezel -->
    <rect x="3" y="23" width="44" height="94" fill="#0f172a"/>
    <!-- Screen content - Medical data visualization -->
    <g opacity="0.8">
      <!-- Grid background -->
      <rect x="5" y="25" width="40" height="90" fill="#1e3a8a" opacity="0.3"/>
      <!-- Waveform line -->
      <polyline points="10,60 15,55 20,50 25,55 30,58 35,52 40,60 45,58" stroke="#22c55e" stroke-width="1.5" fill="none"/>
      <!-- Circular scan lines -->
      <circle cx="25" cy="40" r="8" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
      <circle cx="25" cy="40" r="12" fill="none" stroke="#06b6d4" stroke-width="0.8" opacity="0.4"/>
      <!-- Data values -->
      <text x="35" y="35" font-size="4" fill="#fbbf24">98%</text>
      <text x="35" y="45" font-size="4" fill="#22c55e">OK</text>
    </g>
  </g>
  
  <!-- Digital tablet with medical records (center-bottom) -->
  <g transform="translate(180, 350)">
    <rect x="0" y="0" width="70" height="100" fill="#f0f4f8" stroke="#94a3b8" stroke-width="2" rx="5"/>
    <!-- Home button -->
    <circle cx="35" cy="95" r="4" fill="#94a3b8"/>
    <!-- Screen content -->
    <rect x="5" y="5" width="60" height="85" fill="white" rx="2"/>
    <!-- Health data display -->
    <text x="35" y="20" font-size="6" fill="#1e293b" text-anchor="middle" font-weight="bold">DATOS</text>
    <line x1="10" y1="25" x2="60" y2="25" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Progress bars -->
    <rect x="10" y="30" width="50" height="4" fill="#e2e8f0" rx="2"/>
    <rect x="10" y="30" width="35" height="4" fill="#06b6d4" rx="2"/>
    <text x="65" y="34" font-size="5" fill="#0d7377">70%</text>
    
    <rect x="10" y="40" width="50" height="4" fill="#e2e8f0" rx="2"/>
    <rect x="10" y="40" width="40" height="4" fill="#14b8a6" rx="2"/>
    <text x="65" y="44" font-size="5" fill="#0d7377">80%</text>
    
    <rect x="10" y="50" width="50" height="4" fill="#e2e8f0" rx="2"/>
    <rect x="10" y="50" width="45" height="4" fill="#8b5cf6" rx="2"/>
    <text x="65" y="54" font-size="5" fill="#6d28d9">90%</text>
    
    <!-- Timestamp -->
    <text x="35" y="75" font-size="4" fill="#94a3b8" text-anchor="middle">27 May 2026</text>
  </g>
  
  <!-- AI/Tech brain icon (top right) -->
  <g transform="translate(500, 80)">
    <!-- Brain outline -->
    <path d="M 30 20 Q 20 15, 15 20 Q 10 25, 15 35 Q 10 40, 20 45 Q 30 50, 30 45 Q 40 50, 50 45 Q 60 40, 55 35 Q 60 25, 55 20 Q 50 15, 40 20 Q 35 25, 30 20 Z" fill="#c084fc" opacity="0.6" stroke="#8b5cf6" stroke-width="1.5"/>
    <!-- Neural connections -->
    <circle cx="20" cy="30" r="2" fill="#8b5cf6"/>
    <circle cx="30" cy="25" r="2" fill="#8b5cf6"/>
    <circle cx="40" cy="30" r="2" fill="#8b5cf6"/>
    <circle cx="30" cy="40" r="2" fill="#8b5cf6"/>
    <line x1="20" y1="30" x2="30" y2="25" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
    <line x1="30" y1="25" x2="40" y2="30" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="30" x2="30" y2="40" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
    <line x1="30" y1="40" x2="20" y2="30" stroke="#8b5cf6" stroke-width="1" opacity="0.6"/>
  </g>
  
  <!-- Wireless/signal icon -->
  <g transform="translate(480, 180)" opacity="0.7">
    <path d="M 0 0 Q 5 -5, 10 0" stroke="#1f74ea" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M 0 0 Q 10 -12, 20 0" stroke="#1f74ea" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 0 0 Q 15 -18, 30 0" stroke="#1f74ea" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
    <circle cx="0" cy="0" r="1.5" fill="#1f74ea"/>
  </g>
</svg>