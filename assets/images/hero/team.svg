<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f9ff"/>
  
  <!-- Decorative gradient circles -->
  <circle cx="100" cy="50" r="80" fill="#e0f2fe" opacity="0.6"/>
  <circle cx="700" cy="550" r="100" fill="#ccfbf1" opacity="0.5"/>
  
  <!-- Doctor 1 (Center - larger) -->
  <g transform="translate(250, 150)">
    <!-- Head -->
    <circle cx="60" cy="40" r="35" fill="#f5d5b8"/>
    <!-- Hair -->
    <path d="M 25 40 Q 25 15, 60 15 Q 95 15, 95 40 Z" fill="#2c3e50"/>
    <!-- Body -->
    <rect x="25" y="75" width="70" height="80" rx="10" fill="#1f74ea"/>
    <!-- Arms -->
    <rect x="5" y="85" width="20" height="50" rx="10" fill="#f5d5b8"/>
    <rect x="95" y="85" width="20" height="50" rx="10" fill="#f5d5b8"/>
    <!-- Stethoscope -->
    <path d="M 40 85 Q 30 70, 25 55" stroke="#14b8a6" stroke-width="3" fill="none"/>
  </g>
  
  <!-- Doctor 2 (Left) -->
  <g transform="translate(80, 180)">
    <!-- Head -->
    <circle cx="40" cy="30" r="28" fill="#e8b9a3"/>
    <!-- Hair -->
    <path d="M 12 30 Q 12 8, 40 8 Q 68 8, 68 30 Z" fill="#8b5a3c"/>
    <!-- Body -->
    <rect x="10" y="58" width="60" height="70" rx="8" fill="#0d9488"/>
    <!-- Arms -->
    <rect x="-8" y="65" width="18" height="45" rx="8" fill="#e8b9a3"/>
    <rect x="68" y="68" width="18" height="42" rx="8" fill="#e8b9a3"/>
  </g>
  
  <!-- Doctor 3 (Right) -->
  <g transform="translate(420, 200)">
    <!-- Head -->
    <circle cx="50" cy="35" r="30" fill="#f0d0bc"/>
    <!-- Hair -->
    <path d="M 20 35 Q 20 10, 50 10 Q 80 10, 80 35 Z" fill="#1a5dd7"/>
    <!-- Body -->
    <rect x="15" y="65" width="70" height="75" rx="9" fill="#3b95f6"/>
    <!-- Arms -->
    <rect x="-5" y="75" width="20" height="48" rx="8" fill="#f0d0bc"/>
    <rect x="85" y="78" width="20" height="45" rx="8" fill="#f0d0bc"/>
  </g>
  
  <!-- Nurse/Staff (Front left) -->
  <g transform="translate(150, 320)">
    <!-- Head -->
    <circle cx="35" cy="25" r="25" fill="#ecc5a8"/>
    <!-- Hair -->
    <path d="M 10 25 Q 10 5, 35 5 Q 60 5, 60 25 Z" fill="#c17a3a"/>
    <!-- Body -->
    <rect x="8" y="50" width="54" height="65" rx="7" fill="#14b8a6"/>
    <!-- Cap -->
    <circle cx="35" cy="15" r="20" fill="white" opacity="0.7"/>
    <circle cx="35" cy="18" r="18" fill="#e0f2fe" stroke="#1f74ea" stroke-width="2"/>
  </g>
  
  <!-- Nurse/Staff (Front right) -->
  <g transform="translate(550, 340)">
    <!-- Head -->
    <circle cx="40" cy="28" r="27" fill="#f2cbb5"/>
    <!-- Hair -->
    <path d="M 13 28 Q 13 5, 40 5 Q 67 5, 67 28 Z" fill="#5a4a3a"/>
    <!-- Body -->
    <rect x="10" y="55" width="60" height="70" rx="8" fill="#06b6d4"/>
    <!-- Arms -->
    <rect x="-8" y="65" width="18" height="50" rx="8" fill="#f2cbb5"/>
    <rect x="68" y="63" width="18" height="52" rx="8" fill="#f2cbb5"/>
  </g>
  
  <!-- Medical symbols floating -->
  <!-- Heart -->
  <g transform="translate(650, 120)">
    <path d="M 0 -5 C -5 -10, -12 -10, -12 -3 C -12 0, -5 5, 0 10 C 5 5, 12 0, 12 -3 C 12 -10, 5 -10, 0 -5 Z" fill="#ef4444" opacity="0.8"/>
  </g>
  
  <!-- Plus sign -->
  <g transform="translate(120, 80)" opacity="0.7">
    <rect x="-2" y="-8" width="4" height="16" fill="#14b8a6"/>
    <rect x="-8" y="-2" width="16" height="4" fill="#14b8a6"/>
  </g>
  
  <!-- Circle decorative -->
  <circle cx="680" cy="480" r="40" fill="none" stroke="#1f74ea" stroke-width="2" opacity="0.3"/>
</svg>